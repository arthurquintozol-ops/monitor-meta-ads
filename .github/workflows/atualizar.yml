name: Atualizar Monitor de Anúncios

on:
  schedule:
    # Roda todo dia às 09:00 horário de Brasília (12:00 UTC)
    - cron: "0 12 * * *"

  # Permite rodar manualmente pelo site do GitHub
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Rodar atualização
        run: python atualizar.py

      - name: Salvar dados no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados.json links.txt
          git diff --cached --quiet || git commit -m "Atualização automática $(date +'%d/%m/%Y %H:%M')"
          git pull origin main --rebase
          git push origin main

  deploy:
    needs: atualizar
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pegar dados atualizados
        run: git pull origin main

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload do site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
