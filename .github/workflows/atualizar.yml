name: Atualizar Monitor de Anúncios

on:
  schedule:
    # Roda todo dia às 09:00 horário de Brasília (12:00 UTC)
    - cron: "0 12 * * *"

  # Permite rodar manualmente pelo site do GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Rodar atualização
        run: python atualizar.py monitor_meta_ads.xlsx

      - name: Salvar planilha atualizada no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitor_meta_ads.xlsx
          git diff --cached --quiet || git commit -m "Atualização automática $(date +'%d/%m/%Y %H:%M')"
          git pull --rebase
          git push
